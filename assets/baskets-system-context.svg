<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, Helvetica, Arial, sans-serif;">

<!-- Portfolio managers -->
<g>
  <rect x="230" y="30" width="220" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="50" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Portfolio managers</text>
  <text x="340" y="68" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Citrini, Le Shrub, etc.</text>
</g>

<!-- Users -->
<g>
  <rect x="40" y="180" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="115" y="200" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Users</text>
  <text x="115" y="218" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">$100+ deposits</text>
</g>

<!-- Baskets platform -->
<g>
  <rect x="240" y="170" width="200" height="76" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="194" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Baskets platform</text>
  <text x="340" y="212" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Strategy engine</text>
  <text x="340" y="228" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Weight calculator + UI</text>
</g>

<!-- RIA partner -->
<g>
  <rect x="490" y="180" width="150" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="565" y="200" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">RIA partner</text>
  <text x="565" y="218" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Compliance, KYC</text>
</g>

<!-- IBKR -->
<g>
  <rect x="200" y="340" width="280" height="76" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="364" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">IBKR advisor account</text>
  <text x="340" y="382" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Model portfolios, custody</text>
  <text x="340" y="398" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Auto-rebalancing engine</text>
</g>

<!-- Exchanges -->
<g>
  <rect x="100" y="500" width="100" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="150" y="522" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">NYSE</text>
</g>
<g>
  <rect x="230" y="500" width="100" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="280" y="522" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">NASDAQ</text>
</g>
<g>
  <rect x="360" y="500" width="100" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="410" y="522" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">TSE</text>
</g>
<g>
  <rect x="490" y="500" width="100" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="540" y="522" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">TWSE</text>
</g>

<!-- Arrows -->
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- PM → Baskets -->
<line x1="340" y1="86" x2="340" y2="168" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="348" y="130" font-size="12" fill="#5F5E5A">Publishes portfolio</text>

<!-- Users → Baskets -->
<line x1="190" y1="208" x2="238" y2="208" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="196" y="198" font-size="12" fill="#5F5E5A">Selects basket</text>

<!-- Users → RIA (L-path) -->
<path d="M165 236 L165 280 L565 280 L565 238" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="365" y="274" text-anchor="middle" font-size="12" fill="#5F5E5A">KYC, account opening, deposits</text>

<!-- Baskets → RIA -->
<line x1="440" y1="208" x2="488" y2="208" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="448" y="198" font-size="12" fill="#5F5E5A">Signals</text>

<!-- Baskets → IBKR -->
<line x1="340" y1="246" x2="340" y2="338" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="348" y="296" font-size="12" fill="#5F5E5A">Updates target weights</text>

<!-- RIA → IBKR -->
<line x1="565" y1="236" x2="480" y2="342" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="536" y="298" font-size="12" fill="#5F5E5A">Subscribes</text>
<text x="536" y="312" font-size="12" fill="#5F5E5A">client accounts</text>

<!-- IBKR → Exchanges -->
<line x1="280" y1="416" x2="150" y2="498" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="320" y1="416" x2="280" y2="498" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="380" y1="416" x2="410" y2="498" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="420" y1="416" x2="510" y2="498" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="340" y="464" text-anchor="middle" font-size="12" fill="#5F5E5A">Executes trades across 170+ markets</text>

</svg>